apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: buckets.s3.aws.upbound.io
spec:
  group: s3.aws.upbound.io
  names:
    kind: Bucket
    plural: buckets
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: Bucket is the Schema for the Buckets API.
          properties:
            spec:
              type: object
              description: Desired state for the managed bucket.
              properties:
                forProvider:
                  type: object
                  description: Provider-specific bucket configuration.
                  properties:
                    bucketName:
                      type: string
                      description: Name of the S3 bucket to create.
                    region:
                      type: string
                      description: AWS region for the bucket.
            status:
              type: object
              description: Observed state for the managed bucket.
              properties:
                atProvider:
                  type: object
                  description: Provider-observed bucket state.
                  properties:
                    arn:
                      type: string
                      description: ARN reported by AWS for the bucket.
