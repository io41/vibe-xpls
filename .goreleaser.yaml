version: 2

project_name: vibe-xpls

before:
  hooks:
    - go mod tidy

builds:
  - id: vibe-xpls
    main: ./cmd/vibe-xpls
    binary: vibe-xpls
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/io41/vibe-xpls/internal/app.version=v{{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: vibe-xpls
    ids:
      - vibe-xpls
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  prerelease: auto
  mode: keep-existing
